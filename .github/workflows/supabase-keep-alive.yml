name: Supabase Keep Alive

on:
  schedule:
    - cron: '0 0 */3 * *' # Runs every 3 days at midnight UTC
  workflow_dispatch:

concurrency:
  group: supabase-keep-alive
  cancel-in-progress: false

jobs:
  keep-alive:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Ping Supabase Database
        env:
          # Prefer the same env name used by the Next.js app.
          # SUPABASE_URL is kept as a backward-compatible fallback.
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: |
          set -euo pipefail

          RAW_SUPABASE_URL="${NEXT_PUBLIC_SUPABASE_URL:-${SUPABASE_URL:-}}"

          if [ -z "${RAW_SUPABASE_URL}" ]; then
            echo "::error::Missing Supabase URL secret. Add NEXT_PUBLIC_SUPABASE_URL in GitHub Actions secrets. SUPABASE_URL is also supported as a fallback."
            exit 1
          fi

          if [ -z "${SUPABASE_SERVICE_ROLE_KEY:-}" ]; then
            echo "::error::SUPABASE_SERVICE_ROLE_KEY secret is missing. Set it from Supabase Project Settings > API."
            exit 1
          fi

          SUPABASE_URL="${RAW_SUPABASE_URL%/}"
          SUPABASE_HOST="${SUPABASE_URL#https://}"
          SUPABASE_HOST="${SUPABASE_HOST#http://}"
          SUPABASE_HOST="${SUPABASE_HOST%%/*}"

          if [ -z "${SUPABASE_HOST}" ] || [ "${SUPABASE_HOST}" = "${SUPABASE_URL}" ]; then
            echo "::error::Invalid Supabase URL format. Expected https://<project-ref>.supabase.co"
            exit 1
          fi

          echo "Checking DNS for ${SUPABASE_HOST}..."
          if ! getent hosts "${SUPABASE_HOST}" >/dev/null; then
            echo "::error::Could not resolve ${SUPABASE_HOST}. The saved Supabase URL secret points to a project ref that DNS cannot find. Update GitHub secret NEXT_PUBLIC_SUPABASE_URL to the exact Project URL from Supabase Settings > Data API."
            exit 1
          fi

          echo "Pinging Supabase REST endpoint..."
          curl --fail --show-error --silent \
            --retry 5 \
            --retry-delay 10 \
            --retry-all-errors \
            -X GET "${SUPABASE_URL}/rest/v1/voice_profiles?select=id&limit=1" \
            -H "apikey: ${SUPABASE_SERVICE_ROLE_KEY}" \
            -H "Authorization: Bearer ${SUPABASE_SERVICE_ROLE_KEY}" \
            -H "Accept: application/json" \
            -o /tmp/supabase-keep-alive-response.json

          echo "Supabase project pinged successfully."
